name: Terraform Deploy Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/terraform-deploy.yml"

concurrency:
  group: terraform-state
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  TF_VAR_db_password: ${{ secrets.TF_DB_PASSWORD }}
  TF_VAR_app_key: ${{ secrets.TF_APP_KEY }}
  TF_VAR_ecr_force_delete: "true"

jobs:
  terraform-deploy:
    name: Terraform Deploy Infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Confirm AWS identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init
        working-directory: infra

      - name: Terraform format check
        run: terraform fmt -check -recursive
        working-directory: infra

      - name: Terraform validate
        run: terraform validate
        working-directory: infra

      - name: Terraform plan
        run: terraform plan -lock-timeout=15m
        working-directory: infra

      - name: Terraform apply
        run: terraform apply -auto-approve -lock-timeout=15m
        working-directory: infra

        