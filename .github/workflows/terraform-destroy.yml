name: Terraform Destroy Pipeline

on:
  workflow_dispatch:

concurrency:
  group: terraform-state
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2
  AWS_ROLE_ARN: arn:aws:iam::583931059504:role/snipe-it-github-actions-role
  TF_VAR_db_password: ${{ secrets.TF_DB_PASSWORD }}
  TF_VAR_app_key: ${{ secrets.TF_APP_KEY }}
  TF_VAR_ecr_force_delete: "true"

jobs:
  terraform-destroy:
    name: Terraform Destroy Infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Confirm AWS identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init
        working-directory: infra

      - name: Terraform plan destroy
        run: terraform plan -destroy -lock-timeout=15m
        working-directory: infra

      - name: Terraform destroy
        run: terraform destroy -auto-approve -lock-timeout=15m
        working-directory: infra